name: Build macOS DMG

# Builds the macOS DMG/ZIP (arm64 + x64) with electron-builder. macOS artifacts
# can only be produced on a macOS runner, so this complements the local Windows
# build. Run it manually from the Actions tab, or it runs automatically when a
# version tag (v*) is pushed and attaches the artifacts to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app + bundle server + icons
        run: npm run build:electron

      - name: Package macOS (dmg + zip, arm64 + x64)
        # No Apple Developer certs in CI: skip code signing/notarization and do
        # not publish (artifacts are uploaded below / attached to the Release).
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: airshow-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
